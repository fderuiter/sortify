name: Windows Pipeline

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build-windows-msix:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          
      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "SmartAutoSorter" --paths . app/main.py
          
      - name: Prepare MSIX structure
        shell: pwsh
        run: |
          $dist = "dist\SmartAutoSorter"
          $assets = "$dist\Assets"
          New-Item -ItemType Directory -Force -Path $assets | Out-Null
          
          # Create placeholder images for MSIX manifest requirements
          $images = @("StoreLogo.png", "Square150x150Logo.png", "Square44x44Logo.png", "Wide310x150Logo.png", "Square71x71Logo.png", "Square310x310Logo.png")
          foreach ($img in $images) {
              # Create a simple 1x1 transparent PNG
              $bytes = [byte[]]@(0x89, 0x50, 0x4E, 0x47, 0x0D, 0x0A, 0x1A, 0x0A, 0x00, 0x00, 0x00, 0x0D, 0x49, 0x48, 0x44, 0x52, 0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x01, 0x08, 0x06, 0x00, 0x00, 0x00, 0x1F, 0x15, 0xC4, 0x89, 0x00, 0x00, 0x00, 0x0D, 0x49, 0x44, 0x41, 0x54, 0x78, 0xDA, 0x63, 0x60, 0x00, 0x00, 0x00, 0x02, 0x00, 0x01, 0xE2, 0x26, 0x05, 0x9B, 0x00, 0x00, 0x00, 0x00, 0x49, 0x45, 0x4E, 0x44, 0xAE, 0x42, 0x60, 0x82)
              [System.IO.File]::WriteAllBytes("$assets\$img", $bytes)
          }

      - name: Extract Certificate and Publisher
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          WINDOWS_SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_SIGNING_CERT)) {
              Write-Host "Warning: WINDOWS_SIGNING_CERT is not set. Using dummy publisher."
              $publisher = "CN=SmartAutoSorter"
          } else {
              $certBytes = [System.Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT)
              [System.IO.File]::WriteAllBytes("cert.pfx", $certBytes)
              
              $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2
              $cert.Import("cert.pfx", $env:WINDOWS_SIGNING_PASSWORD, "DefaultKeySet")
              $publisher = $cert.Subject
              Write-Host "Extracted Publisher: $publisher"
          }
          # Save for next steps
          $publisher | Out-File -FilePath publisher.txt -Encoding utf8

      - name: Generate AppxManifest.xml and AppInstaller
        shell: pwsh
        run: |
          $dist = "dist\SmartAutoSorter"
          
          # Parse version from github.ref (e.g., refs/tags/v1.2.3 -> 1.2.3.0)
          $tag = "${{ github.ref_name }}"
          if ($tag -match "v?(\d+\.\d+\.\d+)") {
              $version = $matches[1] + ".0"
          } else {
              $version = "1.0.0.0"
          }
          
          $publisher = Get-Content publisher.txt
          if ([string]::IsNullOrWhiteSpace($publisher)) {
              $publisher = "CN=SmartAutoSorter"
          }

          $manifest = @"
          <?xml version="1.0" encoding="utf-8"?>
          <Package
            xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
            xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
            xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities"
            IgnorableNamespaces="uap rescap">
            <Identity Name="SmartAutoSorter" Publisher="$publisher" Version="$version" ProcessorArchitecture="x64" />
            <Properties>
              <DisplayName>Smart AutoSorter</DisplayName>
              <PublisherDisplayName>Smart AutoSorter</PublisherDisplayName>
              <Logo>Assets\StoreLogo.png</Logo>
            </Properties>
            <Resources>
              <Resource Language="en-us" />
            </Resources>
            <Dependencies>
              <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.19041.0" />
            </Dependencies>
            <Capabilities>
              <rescap:Capability Name="runFullTrust" />
            </Capabilities>
            <Applications>
              <Application Id="SmartAutoSorter" Executable="SmartAutoSorter.exe" EntryPoint="Windows.FullTrustApplication">
                <uap:VisualElements DisplayName="Smart AutoSorter" Description="AI File Organizer Pro" BackgroundColor="transparent" Square150x150Logo="Assets\Square150x150Logo.png" Square44x44Logo="Assets\Square44x44Logo.png">
                  <uap:DefaultTile Wide310x150Logo="Assets\Wide310x150Logo.png" Square71x71Logo="Assets\Square71x71Logo.png" Square310x310Logo="Assets\Square310x310Logo.png" />
                </uap:VisualElements>
              </Application>
            </Applications>
          </Package>
          "@
          
          Set-Content -Path "$dist\AppxManifest.xml" -Value $manifest -Encoding UTF8

          # Create AppInstaller file for background updates
          $appInstaller = @"
          <?xml version="1.0" encoding="utf-8"?>
          <AppInstaller
              Uri="https://github.com/${{ github.repository }}/releases/latest/download/SmartAutoSorter.appinstaller"
              Version="$version"
              xmlns="http://schemas.microsoft.com/appx/appinstaller/2018">
              <MainPackage
                  Name="SmartAutoSorter"
                  Publisher="$publisher"
                  Version="$version"
                  ProcessorArchitecture="x64"
                  Uri="https://github.com/${{ github.repository }}/releases/latest/download/SmartAutoSorter.msix" />
              <UpdateSettings>
                  <OnLaunch HoursBetweenUpdateChecks="0" ShowPrompt="true" UpdateBlocksActivation="false" />
                  <AutomaticBackgroundTask />
              </UpdateSettings>
          </AppInstaller>
          "@
          
          Set-Content -Path "dist\SmartAutoSorter.appinstaller" -Value $appInstaller -Encoding UTF8

      - name: Build MSIX
        shell: pwsh
        run: |
          $makeappx = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "makeappx.exe" -Recurse | Where-Object { $_.DirectoryName -match "x64" } | Select-Object -First 1).FullName
          if (-not $makeappx) {
              Write-Error "makeappx.exe not found"
              exit 1
          }
          & $makeappx pack /d dist\SmartAutoSorter /p dist\SmartAutoSorter.msix

      - name: Sign MSIX Package
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          WINDOWS_SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}
        run: |
          if ([string]::IsNullOrEmpty($env:WINDOWS_SIGNING_CERT)) {
              Write-Host "Skipping signing as no certificate secret is provided."
              exit 0
          }
          $signtool = (Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "signtool.exe" -Recurse | Where-Object { $_.DirectoryName -match "x64" } | Select-Object -First 1).FullName
          if (-not $signtool) {
              Write-Error "signtool.exe not found"
              exit 1
          }
          & $signtool sign /fd SHA256 /a /f cert.pfx /p $env:WINDOWS_SIGNING_PASSWORD dist\SmartAutoSorter.msix

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/SmartAutoSorter.msix
            dist/SmartAutoSorter.appinstaller
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
