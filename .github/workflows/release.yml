name: Release Binaries

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: SmartAutoSorter-Windows.exe
          - os: ubuntu-latest
            artifact_name: SmartAutoSorter-Linux
            
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e .
          
      - name: Build executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "SmartAutoSorter" --paths . app/main.py
          
      - name: Rename executable (Windows)
        if: runner.os == 'Windows'
        run: |
          Move-Item -Path dist\SmartAutoSorter.exe -Destination dist\${{ matrix.artifact_name }}

      - name: Rename executable (Linux)
        if: runner.os == 'Linux'
        run: |
          mv dist/SmartAutoSorter dist/${{ matrix.artifact_name }}

      - name: Generate Checksum (Windows)
        if: runner.os == 'Windows'
        run: |
          $hash = Get-FileHash -Path dist\${{ matrix.artifact_name }} -Algorithm SHA256
          $hash.Hash + "  ${{ matrix.artifact_name }}" | Out-File -FilePath dist\${{ matrix.artifact_name }}.sha256 -Encoding ascii

      - name: Generate Checksum (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          sha256sum ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256
          cd ..

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/${{ matrix.artifact_name }}
            dist/${{ matrix.artifact_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
