name: Release Binaries

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

jobs:
  build-binaries:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: smart-autosorter-Windows.zip
          - os: ubuntu-latest
            artifact_name: smart-autosorter-Linux.tar.gz
            
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          uv sync --all-extras
          
      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: |
          uv run python app/build_windows.py

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: |
          uv run pyinstaller app/main.py --name smart-autosorter --noconfirm --onedir --windowed --add-data="$(uv run python -c 'import os, customtkinter; print(os.path.dirname(customtkinter.__file__))'):customtkinter" --clean

      - name: Package as Archive (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist\smart-autosorter -DestinationPath dist\${{ matrix.artifact_name }}

      - name: Package as Archive (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf dist/${{ matrix.artifact_name }} -C dist smart-autosorter

      - name: Generate Checksum (Windows)
        if: runner.os == 'Windows'
        run: |
          $hash = Get-FileHash -Path dist\${{ matrix.artifact_name }} -Algorithm SHA256
          $hash.Hash + "  ${{ matrix.artifact_name }}" | Out-File -FilePath dist\${{ matrix.artifact_name }}.sha256 -Encoding ascii

      - name: Generate Checksum (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          sha256sum ${{ matrix.artifact_name }} > ${{ matrix.artifact_name }}.sha256
          cd ..

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/${{ matrix.artifact_name }}
            dist/${{ matrix.artifact_name }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
