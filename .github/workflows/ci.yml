name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        enable-cache: true
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        uv sync
        
    - name: Lint with Ruff
      if: matrix.os == 'ubuntu-latest'
      run: |
        uv run ruff check .
        
    - name: Validate External Links
      if: matrix.os == 'ubuntu-latest'
      run: |
        uv run python scripts/validate_links.py
        
    - name: Validate Architectural Guardrails
      if: matrix.os == 'ubuntu-latest'
      run: |
        uv run python scripts/validate_architecture.py
        
    - name: Validate Configuration Schema
      run: |
        uv run python scripts/validate_config.py
        
    - name: CLI Smoke Tests
      run: |
        uv run python scripts/test_cli.py
        
    - name: Test with pytest
      env:
        SMOKE_TEST: "0"
      run: |
        uv run pytest --cov --cov-report=term tests/

    - name: Generate Documentation
      if: matrix.os == 'ubuntu-latest'
      run: |
        uv run python scripts/generate_docs.py
        
    - name: Enforce Documentation Synchronization
      if: matrix.os == 'ubuntu-latest'
      shell: bash
      run: |
        if [[ -n $(git status -s docs/api_reference.md docs/admin_guide.md docs/ui.md SECURITY.md) ]]; then
          echo "Documentation is out of sync! Please run 'uv run python scripts/generate_docs.py' and commit the changes."
          exit 1
        fi
        
    - name: Validate Documentation Integrity
      if: matrix.os == 'ubuntu-latest'
      run: |
        uv run mkdocs build --strict
        
    - name: Deploy Documentation
      if: github.ref == 'refs/heads/main' && matrix.os == 'ubuntu-latest'
      run: |
        uv run mkdocs gh-deploy --force
