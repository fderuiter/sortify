name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        uv sync --all-extras
        
    - name: Lint with Ruff
      run: |
        uv run --all-extras ruff check .
        
    - name: Test with pytest
      env:
        SMOKE_TEST: "1"
      run: |
        uv run --all-extras pytest tests/

    - name: Generate API Reference Docs
      run: |
        python3 scripts/generate_api_reference.py
        
    - name: Enforce Documentation Synchronization
      run: |
        if [[ -n $(git status -s docs/api_reference.md) ]]; then
          echo "Documentation is out of sync! Please run 'python3 scripts/generate_api_reference.py' and commit the changes."
          exit 1
        fi
        
    - name: Validate Documentation Integrity
      run: |
        uv run --all-extras mkdocs build --strict
        
    - name: Deploy Documentation
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      run: |
        uv run --all-extras mkdocs gh-deploy --force
