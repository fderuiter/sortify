site_name: Smart AutoSorter AI Pro API
theme:
  name: material

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_root_heading: true

nav:
  - Home: index.md
  - Architecture & Internals: architecture.md
  - Contributor Guide: contributor.md
  - API Reference:
    - Core: core.md
    - UI: ui.md
    - Config: config.md
