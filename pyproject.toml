[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "autosorter"
version = "0.1.0"
description = "Smart AutoSorter AI Pro"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "pypdf",
    "python-docx",
    "pandas",
    "openpyxl",
    "scikit-learn",
    "customtkinter"
]

[project.optional-dependencies]
dev = [
    "mkdocs",
    "mkdocs-material",
    "mkdocstrings[python]",
    "ruff",
    "mypy"
]

[project.scripts]
docs = "mkdocs:build"

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "D"]
ignore = ["E501"]

[tool.ruff.lint.pydocstyle]
convention = "numpy"

[tool.mypy]
ignore_missing_imports = true

[tool.tox]
legacy_tox_ini = """
[tox]
envlist = lint, docs

[testenv:lint]
deps =
    ruff
    mypy
commands =
    ruff check .
    mypy core ui

[testenv:docs]
deps =
    mkdocs
    mkdocs-material
    mkdocstrings[python]
commands =
    mkdocs build
"""

[tool.hatch.build.targets.wheel]
packages = ["core", "ui"]
py-modules = ["main", "config"]
