repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements
      - id: no-commit-to-branch
        args: ['--branch', 'main']

  - repo: local
    hooks:
      - id: forbid-cache-files
        name: Block cache files, virtual environments, and bytecode
        entry: Cannot commit cache files, bytecode, or virtual environments. Please clean your workspace.
        language: fail
        files: '(\.pytest_cache/|\.venv/|\.coverage$|htmlcov/|__pycache__/|.*\.py[co]$)'
      - id: generate-api-docs
        name: Generate API Reference Docs
        entry: uv run python scripts/generate_docs.py
        language: system
        pass_filenames: false
      - id: mkdocs-build-strict
        name: Validate Documentation Integrity
        entry: bash -c "uv run mkdocs build --strict"
        language: system
        pass_filenames: false
      - id: validate-links
        name: Validate External Links
        entry: uv run python scripts/validate_links.py
        language: system
        files: '^(app/ui/app\.py|scripts/prepare_offline\.py)$'
        pass_filenames: false
      - id: validate-config-schema
        name: Validate Configuration Schema
        entry: uv run python scripts/validate_config.py
        language: system
        files: '^app/config\.py$'
        pass_filenames: false

